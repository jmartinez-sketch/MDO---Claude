<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>MDO Consultores · IG Templates</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* MDO brand palette — extracted from logo + email template */
    --navy:     #1a3a6e;
    --navy-deep:#13284f;
    --navy-ink: #0e1e3d;
    --blue-mid: #3a6db8;
    --blue:     #5f93de;
    --blue-lt:  #7eb3f7;
    --blue-pale:#e8f0fb;
    --blue-tint:#f4f7fd;

    --paper:    #f7f9fc;
    --paper-warm:#fafbfd;
    --ink:      #1a1a2e;
    --ink-70:   #3d4f6b;
    --ink-55:   #5a6e8a;
    --ink-35:   #7a8aa6;
    --ink-15:   #b5c0d2;

    --hair:     rgba(26,58,110,0.14);
    --hair-2:   rgba(26,58,110,0.28);

    --amber-bg: #fffbec;
    --amber-bd: #f0e0a0;
    --amber-tx: #5a4a10;

    --green:    #2e7d6b;
    --purple:   #7b3fa0;
  }

  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Montserrat', system-ui, sans-serif; color: var(--ink); }

  /* ─── Template primitives ─── */
  .tpl {
    width: 100%; height: 100%;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .tpl.navy   { background: var(--navy); color: var(--paper); }
  .tpl.navy-deep { background: var(--navy-deep); color: var(--paper); }
  .tpl.white  { background: #ffffff; }
  .tpl.tint   { background: var(--blue-tint); }
  .tpl.pale   { background: var(--blue-pale); }

  /* ─── Type ─── */
  .eyebrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--blue-mid);
  }
  .tpl.navy .eyebrow, .tpl.navy-deep .eyebrow { color: var(--blue-lt); }

  .display {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .tpl.navy .display, .tpl.navy-deep .display { color: var(--paper); }

  .display-serif {
    font-family: 'Instrument Serif', 'Times New Roman', serif;
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.012em;
  }
  .display-serif em { font-style: italic; }

  .lede {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    line-height: 1.45;
    color: var(--ink-70);
  }
  .tpl.navy .lede, .tpl.navy-deep .lede { color: rgba(247,249,252,0.82); }

  .mono {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-55);
  }

  .number-xl {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 0.85;
    font-variant-numeric: tabular-nums;
  }

  .hair       { height: 1px; background: var(--hair); width: 100%; }
  .hair-ink   { height: 1px; background: var(--ink); width: 100%; }
  .hair-navy  { height: 1px; background: var(--navy); width: 100%; }
  .tpl.navy .hair, .tpl.navy-deep .hair { background: rgba(247,249,252,0.20); }
  .tpl.navy .hair-ink, .tpl.navy-deep .hair-ink { background: var(--paper); }

  /* ─── Image placeholder slot ─── */
  .slot {
    position: relative;
    background:
      repeating-linear-gradient(135deg,
        rgba(26,58,110,0.05) 0 8px,
        rgba(26,58,110,0.10) 8px 16px),
      var(--blue-tint);
    color: var(--ink-55);
    overflow: hidden;
    border: 1px solid var(--hair);
  }
  .tpl.navy .slot, .tpl.navy-deep .slot {
    background:
      repeating-linear-gradient(135deg,
        rgba(247,249,252,0.06) 0 8px,
        rgba(247,249,252,0.12) 8px 16px),
      rgba(247,249,252,0.04);
    color: rgba(247,249,252,0.55);
    border-color: rgba(247,249,252,0.18);
  }
  .slot-cap {
    position: absolute; left: 12px; bottom: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ─── Brand lockups ─── */
  .lockup {
    display: inline-flex; align-items: center; gap: 10px;
  }
  .lockup img.iso { display: block; height: 28px; width: auto; }
  .lockup .wm {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    line-height: 1.15;
    color: var(--navy);
    text-transform: uppercase;
  }
  .lockup .wm small {
    display: block;
    font-weight: 500;
    font-size: 8.5px;
    letter-spacing: 0.14em;
    color: var(--ink-55);
    margin-top: 1px;
  }
  .tpl.navy .lockup .wm, .tpl.navy-deep .lockup .wm { color: var(--paper); }
  .tpl.navy .lockup .wm small, .tpl.navy-deep .lockup .wm small { color: rgba(247,249,252,0.65); }

  /* Footer row used on most templates */
  .footer-row {
    display: flex; justify-content: space-between; align-items: end;
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    color: var(--ink-55);
  }
  .tpl.navy .footer-row, .tpl.navy-deep .footer-row { color: rgba(247,249,252,0.55); }

  /* Chip / pill */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--hair-2);
    border-radius: 999px;
    font-family: 'Geist Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--navy);
    background: rgba(255,255,255,0.5);
  }
  .chip.solid { background: var(--navy); color: var(--paper); border-color: var(--navy); }
  .chip.amber { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber-tx); }
  .tpl.navy .chip, .tpl.navy-deep .chip {
    color: var(--paper); border-color: rgba(247,249,252,0.30); background: transparent;
  }
  .tpl.navy .chip.solid, .tpl.navy-deep .chip.solid {
    background: var(--paper); color: var(--navy); border-color: var(--paper);
  }

  /* Numeric step (for tip lists) */
  .step-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 36px;
    color: var(--blue-mid);
    line-height: 0.8;
  }

  .asterisk {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--blue-mid);
    line-height: 0.7;
  }

  /* Page index for carousels */
  .pgindex {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em;
    color: var(--ink-55);
    display: inline-flex; align-items: center; gap: 6px;
    text-transform: uppercase;
  }
  .pgindex .num { color: var(--navy); font-weight: 500; }
  .pgindex .bar { width: 10px; height: 1px; background: currentColor; opacity: 0.4; }
  .tpl.navy .pgindex .num, .tpl.navy-deep .pgindex .num { color: var(--paper); }

  /* Subtle background grain / lines for some variants */
  .bg-grid {
    background-image:
      linear-gradient(to right, rgba(26,58,110,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .bg-grid-navy {
    background-image:
      linear-gradient(to right, rgba(247,249,252,0.06) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* Big quote mark */
  .quote-mark {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    line-height: 0.7;
    color: var(--blue-mid);
  }
</style>
</head>
